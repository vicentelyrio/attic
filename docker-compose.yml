services:
  attic:
    image: ghcr.io/vicentelyrio/attic:latest
    # To build the image locally instead of pulling, comment out `image` above
    # and uncomment the next line:
    # build: .
    ports:
      - "4000:4000"
    volumes:
      # Attic's own state (the SQLite database).
      - ./data:/data
      # Each directory you mount under /data/roots becomes a drive in the UI,
      # named after the folder on the right. Add a line per drive; point the left
      # side at your files (e.g. /mnt/tank/media:/data/roots/media).
      - ./data/roots/files:/data/roots/files
    environment:
      # Generate a hash with:
      #   docker run --rm -it ghcr.io/vicentelyrio/attic hash-password
      # then put it in a .env file next to this compose file as
      # VAULT_OWNER_PASSWORD_HASH=...
      VAULT_OWNER_PASSWORD_HASH: ${VAULT_OWNER_PASSWORD_HASH:?set VAULT_OWNER_PASSWORD_HASH in .env}
    restart: unless-stopped
